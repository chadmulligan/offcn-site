<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFFCN Productions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #F4F0E8;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 24px;
    }

    .logo {
      width: 100%;
      max-width: 620px;
      /* height scales automatically because the SVG has a viewBox */
    }
  </style>
</head>
<body>
  <!--
    Key responsive change:
    - Removed width="620" height="300" from the <svg> tag
    - The viewBox is kept so the SVG scales proportionally
    - CSS controls actual size: 100% wide, capped at 620px
  -->
  <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300">
    <rect width="620" height="300" fill="#F4F0E8"/>

    <line x1="65" y1="77" x2="542" y2="77" stroke="#111111" stroke-width="2"/>

    <text
      x="300"
      y="205"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-weight="800"
      font-size="148"
      letter-spacing="-2"
      text-anchor="middle"
      fill="#111111"
    >OFFCN</text>

    <line x1="65" y1="222" x2="542" y2="222" stroke="#111111" stroke-width="0.8"/>
    <line x1="65" y1="228" x2="542" y2="228" stroke="#111111" stroke-width="2"/>

    <text
      x="300"
      y="260"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-weight="300"
      font-size="11"
      letter-spacing="9"
      text-anchor="middle"
      fill="#111111"
    >PRODUCTIONS</text>
  </svg>
</body>
</html>
