<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="offcn-favicon.svg">
  <title>officina</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #F4F0E8;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 900px;
    }

    .logo {
      width: 100%;
    }

    .contact {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 4px;
      color: #111111;
      text-transform: lowercase;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <svg id="logo" class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300">
    <rect width="620" height="300" fill="#F4F0E8"></rect>

    <!-- OFFCN lines + text -->
    <line id="line-top" stroke="#111111" stroke-width="2" x1="112" x2="525" y1="77" y2="77"></line>
    <text id="text-main" x="310" y="205" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="800" font-size="148" letter-spacing="-21" text-anchor="middle" fill="#111111">OFFCN</text>
    <line id="line-thin" stroke="#111111" stroke-width="0.8" x1="112" x2="525" y1="222" y2="222"></line>
    <line id="line-thick" stroke="#111111" stroke-width="2" x1="112" x2="525" y1="228" y2="228"></line>

    <text id="text-sub" x="315" y="260" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="450" font-size="12" letter-spacing="6" text-anchor="middle" fill="#111111">PRODUCTIONS</text>
  </svg>
  <span class="contact">info[at]officina.productions</span>
</div>
</body>
</html>
