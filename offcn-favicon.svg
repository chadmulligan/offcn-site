<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#F4F0E8"/>
  <!-- rule top thick -->
  <line x1="2" y1="5" x2="30" y2="5" stroke="#1c1a1a" stroke-width="3"/>
  <!-- filled bar -->
  <rect x="2" y="10" width="28" height="8" fill="#1c1a1a"/>
  <!-- rule thin -->
  <line x1="2" y1="22" x2="30" y2="22" stroke="#1c1a1a" stroke-width="2"/>
  <!-- rule bottom thick -->
  <line x1="2" y1="26" x2="30" y2="26" stroke="#1c1a1a" stroke-width="3"/>
</svg>
